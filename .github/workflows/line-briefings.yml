name: Scheduled Briefings

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger email briefing cron
        env:
          BRIEFING_CRON_URL: https://plander-jp-manager.vercel.app/api/cron/briefings
          AUTOMATION_CRON_SECRET: ${{ secrets.AUTOMATION_CRON_SECRET }}
        run: |
          status=$(curl -sS -o response.json -w "%{http_code}" \
            -H "Authorization: Bearer ${AUTOMATION_CRON_SECRET}" \
            "${BRIEFING_CRON_URL}")
          cat response.json
          if [ "$status" -ge 400 ]; then
            echo "Email cron failed with status ${status}"
            exit 1
          fi

      - name: Trigger LINE briefing cron
        env:
          LINE_CRON_URL: https://plander-jp-manager.vercel.app/api/cron/briefings/line
          AUTOMATION_CRON_SECRET: ${{ secrets.AUTOMATION_CRON_SECRET }}
        run: |
          status=$(curl -sS -o response.json -w "%{http_code}" \
            -H "Authorization: Bearer ${AUTOMATION_CRON_SECRET}" \
            "${LINE_CRON_URL}")
          cat response.json
          if [ "$status" -ge 400 ]; then
            echo "LINE cron failed with status ${status}"
            exit 1
          fi

      - name: Trigger schedule reminder cron
        env:
          SCHEDULE_CRON_URL: https://plander-jp-manager.vercel.app/api/cron/schedules
          AUTOMATION_CRON_SECRET: ${{ secrets.AUTOMATION_CRON_SECRET }}
        run: |
          status=$(curl -sS -o response.json -w "%{http_code}" \
            -H "Authorization: Bearer ${AUTOMATION_CRON_SECRET}" \
            "${SCHEDULE_CRON_URL}")
          cat response.json
          if [ "$status" -ge 400 ]; then
            echo "Schedule cron failed with status ${status}"
            exit 1
          fi
